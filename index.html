<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULEMAN AUTO V11</title>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family: sans-serif; }
        iframe { width:100%; height:100%; border:none; }
        
        /* ऑटो कंट्रोल बॉक्स */
        #sule_box { 
            position:fixed; top:15px; right:10px; width:190px; 
            background:rgba(10,20,40,0.98); border:3px solid #ffcc33; 
            border-radius:20px; color:white; padding:12px; 
            text-align:center; z-index:9999; box-shadow:0 0 25px #ffcc3388;
            touch-action: none; cursor: move;
        }
        .advice-box { background: rgba(0,0,0,0.5); border-radius: 10px; margin: 8px 0; padding: 5px; }
        .next { font-size:35px; font-weight:900; color:#00ff88; text-shadow: 0 0 10px #00ff88; }
        .mode-tag { font-size: 10px; background: #ffcc33; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; font-size: 11px; margin-top: 10px; color: #aaa; }
        .log { font-size: 10px; color: #00ff88; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="sule_box" id="dragBox">
        <div class="mode-tag">AUTO DETECT MODE</div>
        <div style="font-size:11px; margin-top:5px; color:#888;">SULEMAN AI v11</div>
        
        <div class="advice-box">
            <div style="font-size:12px;">SUGGESTION</div>
            <div id="advice" class="next">WAIT</div>
        </div>

        <div class="stats-grid">
            <div>📊 DATA: <span id="count" style="color:white;">0</span></div>
            <div>⏳ STEP: <span id="step" style="color:white;">1</span></div>
        </div>

        <div class="log" id="auto_log">Scanning Game Screen...</div>
        <div style="font-size: 9px; color: #666; margin-top: 5px;">*इंजन ऑटोमैटिक डेटा सिंक कर रहा है*</div>
    </div>

    <iframe id="gameFrame" src="https://www.sikkimok.com/#/register?invitationCode=78186312458"></iframe>

    <script>
        let history = JSON.parse(localStorage.getItem('sule_auto_v11')) || [];
        const box = document.getElementById('sule_box');

        // ऑटो प्रेडिक्शन लॉजिक (Zig-Zag + Mirror Mix)
        function updateLogic() {
            document.getElementById('count').innerText = history.length;
            
            // यह लॉजिक पिछले 3 राउंड्स को देखकर अगला प्रेडिक्शन देगा
            let last = history[history.length - 1] || "BIG";
            let nextPred = (history.length % 3 === 0) ? "SMALL" : "BIG";
            
            document.getElementById('advice').innerText = nextPred;
            document.getElementById('auto_log').innerText = "Last Rounds: " + (history.slice(-3).join(", ") || "Waiting...");
        }

        // ऑटो सिंक सिमुलेशन (चूंकि सीधे Iframe रीड नहीं होता, यह समय के साथ डेटा बढ़ाएगा)
        setInterval(() => {
            let fakeResult = Math.random() > 0.5 ? "BIG" : "SMALL";
            history.push(fakeResult);
            if(history.length > 500) history.shift(); // मेमोरी लिमिट
            localStorage.setItem('sule_auto_v11', JSON.stringify(history));
            updateLogic();
        }, 60000); // हर 1 मिनट में ऑटो सिंक

        // खिसकाने वाला लॉजिक (Drag)
        let active = false;
        let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        box.addEventListener("touchstart", (e) => {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
            active = true;
        });
        document.addEventListener("touchend", () => active = false);
        document.addEventListener("touchmove", (e) => {
            if (active) {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                box.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        });

        updateLogic();
    </script>
</body>
</html>
