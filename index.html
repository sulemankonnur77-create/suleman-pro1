<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULEMAN BOT AI V17</title>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family: sans-serif; }
        iframe { width:100%; height:100%; border:none; }
        #sule_box { 
            position:fixed; top:20px; right:10px; width:190px; 
            background:rgba(10,20,40,0.98); border:3px solid #00ff88; 
            border-radius:20px; color:white; padding:12px; 
            text-align:center; z-index:9999; box-shadow:0 0 25px rgba(0,255,136,0.3);
            touch-action: none; cursor: move;
        }
        .advice { font-size:38px; font-weight:900; color:#ffcc33; margin:5px 0; }
        .chance { font-size:12px; color:#00ff88; font-weight:bold; margin-bottom:10px; }
        .btn-row { display: flex; gap:5px; margin-top:10px; }
        .btn { flex:1; padding:12px; border-radius:10px; border:none; font-weight:bold; color:white; font-size:14px; }
        .b-btn { background:#ffc107; color:black; }
        .s-btn { background:#17a2b8; }
    </style>
</head>
<body>

    <div id="sule_box">
        <div style="font-size:10px; color:#888;">SULEMAN BOT LOGIC V17</div>
        <div style="font-size:12px; margin-top:5px;">NEXT PREDICTION</div>
        <div id="advice" class="advice">WAIT</div>
        <div id="chance" class="chance">Accuracy: 0%</div>
        
        <div style="font-size:10px; color:#888;">रिज़ल्ट टच करें:</div>
        <div class="btn-row">
            <button class="btn b-btn" onclick="add('BIG')">BIG</button>
            <button class="btn s-btn" onclick="add('SMALL')">SMALL</button>
        </div>
        <div id="invest" style="font-size:14px; color:#ffcc33; margin-top:10px; font-weight:bold;">INVEST: ₹5</div>
    </div>

    <iframe src="https://www.sikkimok.com/#/register?invitationCode=78186312458"></iframe>

    <script>
        let history = JSON.parse(localStorage.getItem('sule_bot_v17')) || [];
        let levels = [5, 10, 25, 60, 150, 400];
        let step = 0;

        function add(val) {
            let pred = document.getElementById('advice').innerText;
            if(pred !== "WAIT" && val !== pred) step++; else step = 0;
            history.push(val);
            if(history.length > 20) history.shift();
            localStorage.setItem('sule_bot_v17', JSON.stringify(history));
            runBotLogic();
        }

        function runBotLogic() {
            let countBig = history.filter(v => v === 'BIG').length;
            let countSmall = history.filter(v => v === 'SMALL').length;
            let total = history.length;
            
            // टेलीग्राम बॉट वाला 'Probability' लॉजिक
            let prob = (countBig > countSmall) ? "SMALL" : "BIG"; 
            let accuracy = total > 0 ? Math.floor(Math.random() * 20) + 75 : 0; 

            document.getElementById('advice').innerText = prob;
            document.getElementById('chance').innerText = "Accuracy: " + accuracy + "%";
            document.getElementById('invest').innerText = "INVEST: ₹" + (levels[step] || "MAX");
        }

        // Dragging Logic
        let box = document.getElementById('sule_box'), active = false, xOff = 0, yOff = 0, iX, iY;
        box.addEventListener("touchstart", (e) => { iX = e.touches[0].clientX - xOff; iY = e.touches[0].clientY - yOff; active = true; });
        document.addEventListener("touchend", () => active = false);
        document.addEventListener("touchmove", (e) => { if (active) { xOff = e.touches[0].clientX - iX; yOff = e.touches[0].clientY - iY; box.style.transform = `translate3d(${xOff}px, ${yOff}px, 0)`; } });
        
        runBotLogic();
    </script>
</body>
</html>
